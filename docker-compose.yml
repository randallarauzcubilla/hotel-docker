version: '3.8'
services:
  postgres:
    image: postgres:15
    container_name: hotel_db
    restart: always
    environment:
      POSTGRES_USER: hotel_user
      POSTGRES_PASSWORD: hotel1234
      POSTGRES_DB: hotel_sistema
    ports:
      - "5432:5432"
    volumes:
      - hotel_data:/var/lib/postgresql/data

volumes:
  hotel_data: